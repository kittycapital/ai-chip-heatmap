name: Update AI/Semiconductor Data

on:
  schedule:
    - cron: '0 22 * * 1-5'  # 매주 월~금 UTC 22:00 (KST 07:00) 미장 마감 후
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Fetch data
        run: python scripts/fetch_data.py

      - name: Generate HTML
        run: python scripts/generate_html.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ valuechain.html etf_compare.html
          git diff --staged --quiet || git commit -m "Update AI/semiconductor data $(date +'%Y-%m-%d %H:%M')"
          git push
